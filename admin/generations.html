<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CopyPilot Admin | 生成记录</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body data-admin-required>
  <div class="admin-layout">
    <aside class="sidebar">
      <a class="brand" href="./index.html"><span class="brand-mark">AD</span><span>Admin</span></a>
      <nav class="side-nav">
        <a href="./index.html">后台首页</a>
        <a href="./users.html">用户管理</a>
        <a class="active" href="./generations.html">生成记录</a>
        <a href="./billing.html">支付与订阅</a>
      </nav>
      <div class="sidebar-foot">用于查看生成内容、失败记录和渠道分布。</div>
    </aside>

    <main class="workspace">
      <header class="workspace-head">
        <div>
          <h1>生成记录</h1>
          <p>查看用户、产品名、投放渠道、生成状态和创建时间。</p>
        </div>
        <span class="status success">Admin</span>
      </header>

      <section class="grid three" data-admin-generation-summary>
        <article class="card"><div class="accent-line"></div><h3>生成总数</h3><p>正在读取...</p></article>
        <article class="card"><div class="accent-line coral"></div><h3>失败记录</h3><p>正在读取...</p></article>
        <article class="card"><div class="accent-line yellow"></div><h3>高频渠道</h3><p>正在读取...</p></article>
      </section>

      <section class="table-wrap" style="margin-top: 18px;">
        <table>
          <thead>
            <tr>
              <th>用户</th>
              <th>产品名</th>
              <th>渠道</th>
              <th>状态</th>
              <th>创建时间</th>
            </tr>
          </thead>
          <tbody data-admin-generations-page>
            <tr><td colspan="5">正在读取生成记录...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase-config.js"></script>
  <script src="../assets/supabase-auth.js"></script>
  <script src="../assets/admin.js"></script>
</body>
</html>
