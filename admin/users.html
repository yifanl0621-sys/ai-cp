<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CopyPilot Admin | 用户管理</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <a class="brand" href="./index.html"><span class="brand-mark">AD</span><span>Admin</span></a>
      <nav class="side-nav">
        <a href="./index.html">后台首页</a>
        <a class="active" href="./users.html">用户管理</a>
        <a href="./generations.html">生成记录</a>
        <a href="./billing.html">支付订单</a>
      </nav>
      <div class="sidebar-foot">封禁和恢复按钮为前端占位。</div>
    </aside>

    <main class="workspace">
      <header class="workspace-head">
        <div>
          <h1>用户管理</h1>
          <p>查看用户角色、套餐状态、最近活跃和生成次数。</p>
        </div>
        <button class="btn secondary">筛选用户</button>
      </header>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>邮箱</th>
              <th>角色</th>
              <th>套餐</th>
              <th>状态</th>
              <th>最近活跃</th>
              <th>生成次数</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody data-users></tbody>
        </table>
      </section>
    </main>
  </div>
  <script src="../assets/data.js"></script>
  <script src="../assets/site.js"></script>
</body>
</html>
