<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CopyPilot Admin | 支付与订阅</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body data-admin-required>
  <div class="admin-layout">
    <aside class="sidebar">
      <a class="brand" href="./index.html"><span class="brand-mark">AD</span><span>Admin</span></a>
      <nav class="side-nav">
        <a href="./index.html">后台首页</a>
        <a href="./users.html">用户管理</a>
        <a href="./generations.html">生成记录</a>
        <a class="active" href="./billing.html">支付与订阅</a>
      </nav>
      <div class="sidebar-foot">订单状态来自 billing_records，套餐状态来自 profiles。</div>
    </aside>

    <main class="workspace">
      <header class="workspace-head">
        <div>
          <h1>支付与订阅</h1>
          <p>查看支付订单、订阅状态、退款与失败订单。</p>
        </div>
        <span class="status success">Admin</span>
      </header>

      <section class="metrics" data-admin-billing-summary>
        <article class="metric-card"><span>付费收入</span><strong>-</strong><small>正在读取</small></article>
        <article class="metric-card"><span>成功订单</span><strong>-</strong><small>正在读取</small></article>
        <article class="metric-card"><span>失败/退款</span><strong>-</strong><small>正在读取</small></article>
        <article class="metric-card"><span>Pro 用户</span><strong>-</strong><small>正在读取</small></article>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>用户</th>
              <th>套餐</th>
              <th>周期</th>
              <th>金额</th>
              <th>支付状态</th>
              <th>创建时间</th>
            </tr>
          </thead>
          <tbody data-admin-billing-page>
            <tr><td colspan="6">正在读取支付订单...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase-config.js"></script>
  <script src="../assets/supabase-auth.js"></script>
  <script src="../assets/admin.js"></script>
</body>
</html>
