<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CopyPilot Admin | 后台首页</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body data-admin-required>
  <div class="admin-layout">
    <aside class="sidebar">
      <a class="brand" href="./index.html"><span class="brand-mark">AD</span><span>Admin</span></a>
      <nav class="side-nav">
        <a class="active" href="./index.html">后台首页</a>
        <a href="./users.html">用户管理</a>
        <a href="./generations.html">生成记录</a>
        <a href="./billing.html">支付与订阅</a>
      </nav>
      <div class="sidebar-foot">仅 role = admin 的账号可访问后台。</div>
    </aside>

    <main class="workspace">
      <header class="workspace-head">
        <div>
          <h1>后台首页</h1>
          <p>查看用户规模、生成使用量、付费收入和转化概览。</p>
        </div>
        <span class="status success">Admin</span>
      </header>

      <section class="metrics" data-admin-metrics>
        <article class="metric-card"><span>用户总数</span><strong>-</strong><small>正在读取</small></article>
        <article class="metric-card"><span>生成次数</span><strong>-</strong><small>正在读取</small></article>
        <article class="metric-card"><span>付费收入</span><strong>-</strong><small>正在读取</small></article>
        <article class="metric-card"><span>付费转化</span><strong>-</strong><small>正在读取</small></article>
      </section>

      <section class="split admin-dashboard-split">
        <article class="panel">
          <div class="panel-head">
            <div>
              <h2>最近生成</h2>
              <p>最新的营销文案生成记录。</p>
            </div>
            <a class="btn secondary" href="./generations.html">查看全部</a>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>用户</th>
                  <th>产品名</th>
                  <th>渠道</th>
                  <th>时间</th>
                </tr>
              </thead>
              <tbody data-admin-recent-generations>
                <tr><td colspan="4">正在读取生成记录...</td></tr>
              </tbody>
            </table>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <h2>转化概览</h2>
              <p>最近支付订单和订阅状态。</p>
            </div>
            <a class="btn secondary" href="./billing.html">查看订单</a>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>用户</th>
                  <th>套餐</th>
                  <th>状态</th>
                  <th>金额</th>
                </tr>
              </thead>
              <tbody data-admin-recent-billing>
                <tr><td colspan="4">正在读取支付记录...</td></tr>
              </tbody>
            </table>
          </div>
        </article>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase-config.js"></script>
  <script src="../assets/supabase-auth.js"></script>
  <script src="../assets/admin.js"></script>
</body>
</html>
