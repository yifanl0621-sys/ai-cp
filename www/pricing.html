<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 营销文案 SaaS | 定价</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <header class="topbar">
    <nav class="nav container">
      <a class="brand" href="./index.html"><span class="brand-mark">AI</span><span>CopyPilot</span></a>
      <div class="nav-links">
        <a href="./index.html">首页</a>
        <a class="active" href="./pricing.html">定价</a>
        <a href="./faq.html">FAQ</a>
      </div>
      <div class="nav-actions">
        <a class="btn primary" href="../app/login.html">登录/注册</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="section pricing-hero">
      <div class="container">
        <div class="section-head">
          <div>
            <span class="eyebrow">Pricing</span>
            <h1>从试用到稳定产出，按阶段选择套餐</h1>
            <p class="lead">Free 用来验证流程，Pro 适合持续生成营销文案，Team 为后续多人协作预留。</p>
          </div>
          <div class="chip-row">
            <button class="chip active" data-cycle-button="monthly">月付</button>
            <button class="chip" data-cycle-button="yearly">年付</button>
          </div>
        </div>
        <div class="grid three" data-pricing data-cycle="monthly"></div>
      </div>
    </section>

    <section class="section tight">
      <div class="container grid three">
        <article class="card">
          <div class="accent-line"></div>
          <h3>先跑通生成</h3>
          <p>注册后即可进入工作台，填写产品信息并生成第一版营销文案。</p>
        </article>
        <article class="card">
          <div class="accent-line coral"></div>
          <h3>保存和复用</h3>
          <p>每次生成都会保存到历史记录，方便后续查看、复盘和继续编辑。</p>
        </article>
        <article class="card">
          <div class="accent-line yellow"></div>
          <h3>支付后自动升级</h3>
          <p>Pro 支付通过 Stripe Checkout 完成，成功后由 webhook 自动同步套餐状态。</p>
        </article>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">CopyPilot：AI 营销文案生成、历史记录、套餐支付和后台管理。</div>
  </footer>
  <script src="../assets/data.js"></script>
  <script src="../assets/site.js"></script>
</body>
</html>
