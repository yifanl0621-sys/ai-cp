<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CopyPilot | 注册</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="auth-page">
    <aside class="auth-aside">
      <a class="brand" href="../www/index.html"><span class="brand-mark">AI</span><span>CopyPilot</span></a>
      <div>
        <span class="eyebrow">7 天试用</span>
        <h1>创建你的内容工作台</h1>
        <p>第一版目标是让用户 5 分钟内完成注册并生成第一版文案。注册页先保留条款确认和跳转工作台结构。</p>
      </div>
      <p>注册完成后进入生成工作台。</p>
    </aside>
    <section class="auth-main">
      <form class="auth-card" action="./generate.html">
        <h1>注册</h1>
        <p class="empty-note">创建账号后即可体验基础生成流程。</p>
        <div class="form-grid">
          <div class="field">
            <label for="name">姓名</label>
            <input id="name" name="name" type="text" value="市场负责人">
          </div>
          <div class="field">
            <label for="email">邮箱</label>
            <input id="email" name="email" type="email" value="newuser@copypilot.cn">
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" value="password">
          </div>
          <label class="chip"><input type="checkbox" checked> 我同意服务条款和隐私政策</label>
          <button class="btn primary full" type="submit">注册并进入工作台</button>
        </div>
        <p class="empty-note">已有账号？<a href="./login.html">返回登录</a></p>
      </form>
    </section>
  </main>
</body>
</html>
