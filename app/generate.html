<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CopyPilot | 生成工作台</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="generate-page" data-auth-required>
  <div class="app-layout">
    <aside class="sidebar">
      <a class="brand" href="../www/index.html"><span class="brand-mark">AI</span><span>CopyPilot</span></a>
      <nav class="side-nav" data-app-nav>
        <a class="active" href="./generate.html" data-guest-redirect>生成工作台</a>
        <a href="./history.html" data-guest-redirect>历史记录</a>
        <a href="./billing.html" data-auth-only>套餐页</a>
      </nav>
      <div class="sidebar-user" data-auth-only>
        <div class="avatar">M</div>
        <div>
          <strong>市场负责人</strong>
          <span>当前套餐：Pro</span>
          <span>本月已生成 128 / 800 次</span>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <header class="workspace-head">
        <div>
          <h1>生成工作台</h1>
          <p>输入产品信息、目标用户和卖点，生成适配投放渠道的营销文案。</p>
        </div>
        <div class="account-pill" data-auth-only><span class="avatar" data-user-avatar>M</span><span data-user-email>市场负责人</span></div>
      </header>

      <section class="workspace-grid">
        <form class="panel form-grid generate-form-panel" data-generate-form>
          <div class="generate-form-scroll">
            <div>
              <h3>文案 Brief</h3>
              <p class="empty-note">填写产品信息后，后端会调用模型生成文案，并自动保存到历史记录。</p>
            </div>
            <div class="field">
              <label for="productName">产品名称</label>
              <input id="productName" name="productName" value="CopyPilot" required>
            </div>
            <div class="field">
              <label for="intro">一句话介绍</label>
              <textarea id="intro" name="intro" required>面向独立开发者和小团队的 AI 营销文案工作台。</textarea>
            </div>
            <div class="field">
              <label for="audience">目标用户</label>
              <input id="audience" name="audience" value="独立开发者、小团队、内容运营者" required>
            </div>
            <div class="field">
              <label>3 个卖点</label>
              <div class="selling-points">
                <input name="point1" value="把产品信息结构化成清晰 brief">
                <input name="point2" value="一次生成标题、CTA、短文案和长文案">
                <input name="point3" value="支持多渠道投放语境快速切换">
              </div>
            </div>
            <div class="field">
              <label for="channel">投放渠道</label>
              <select id="channel" name="channel" required>
                <option>官网</option>
                <option>朋友圈</option>
                <option>小红书</option>
                <option>抖音</option>
                <option>邮件</option>
              </select>
            </div>
          </div>
          <div class="generate-form-actions">
            <button class="btn primary full" type="submit" data-generate-button>生成文案</button>
          </div>
        </form>

        <section class="panel generate-result-panel">
          <div class="result-header">
            <div>
              <h3>生成结果</h3>
              <p class="empty-note">结果会展示主标题、副标题、CTA、3 版短文案和长文案，并保存到历史记录。</p>
            </div>
            <span class="status pending" data-generate-status>待生成</span>
          </div>
          <div class="result-stage" data-generate-result>
            <div class="empty-state">
              <strong>还没有生成结果</strong>
              <p>填写左侧 brief 后点击“生成文案”，这里会展示模型生成的营销文案。</p>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase-config.js"></script>
  <script src="../assets/supabase-auth.js"></script>
  <script src="../assets/generations.js"></script>
</body>
</html>
