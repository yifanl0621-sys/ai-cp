<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 营销文案 SaaS 前端骨架</title>
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <main class="container section">
    <span class="eyebrow">Front-end Skeleton</span>
    <h1>AI 营销文案 SaaS</h1>
    <p class="lead">基于 PRD 生成的三入口前端骨架。当前只包含页面结构、假数据和轻量交互，不接真实接口。</p>
    <section class="grid three" style="margin-top: 28px;">
      <article class="card">
        <div class="accent-line"></div>
        <h3>www 官网</h3>
        <p>首页、定价、FAQ，负责转化和产品价值表达。</p>
        <a class="btn primary" href="./www/index.html">进入官网</a>
      </article>
      <article class="card">
        <div class="accent-line coral"></div>
        <h3>app 工作台</h3>
        <p>登录、注册、生成工作台、历史记录、套餐页。</p>
        <a class="btn primary" href="./app/generate.html">进入工作台</a>
      </article>
      <article class="card">
        <div class="accent-line yellow"></div>
        <h3>admin 后台</h3>
        <p>后台首页、用户管理、生成记录、支付订单。</p>
        <a class="btn primary" href="./admin/index.html">进入后台</a>
      </article>
    </section>
  </main>
</body>
</html>
